<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vilonia Eagles Countdown</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background-overlay"></div>

    <div class="container">
        <h1 class="brand-title">#RELENTLESS PURSUIT</h1>
        
        <div class="countdown-panel">
            <h2 class="panel-header">COUNTDOWN TO KICKOFF</h2>
            
            <div class="timer">
                <div class="time-block">
                    <span id="days">00</span>
                    <div class="label">DAYS</div>
                </div>
                <div class="divider">|</div>
                <div class="time-block">
                    <span id="hours">00</span>
                    <div class="label">HOURS</div>
                </div>
                <div class="divider">|</div>
                <div class="time-block">
                    <span id="minutes">00</span>
                    <div class="label">MINUTES</div>
                </div>
                <div class="divider">|</div>
                <div class="time-block">
                    <span id="seconds">00</span>
                    <div class="label">SECONDS</div>
                </div>
            </div>
        </div>

        <div class="matchup">
            <span class="vilonia">VILONIA EAGLES</span> <span class="vs">vs</span> <span class="opponent">NETTLETON</span>
        </div>
        <div class="game-time">
            AUGUST 28 <span class="divider-red">|</span> 7:00 PM
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
