<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vilonia Eagles Countdown</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Teko:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background-overlay"></div>
    <div class="lightning-flash"></div>

    <div class="container">
        <div class="logo-container">
            <img src="logo.png" alt="Vilonia Eagles Logo" class="eagle-logo" onerror="this.style.display='none';">
        </div>

        <h1 class="brand-title">#RELENTLESS PURSUIT</h1>
        
        <div class="countdown-panel">
            <h2 class="panel-header">COUNTDOWN TO KICKOFF</h2>
            
            <div class="timer">
                <div class="time-block">
                    <span id="days">00</span>
                    <div class="label">DAYS</div>
                </div>
                <div class="divider">|</div>
                <div class="time-block">
                    <span id="hours">00</span>
                    <div class="label">HOURS</div>
                </div>
                <div class="divider">|</div>
                <div class="time-block">
                    <span id="minutes">00</span>
                    <div class="label">MINUTES</div>
                </div>
                <div class="divider">|</div>
                <div class="time-block">
                    <span id="seconds">00</span>
                    <div class="label">SECONDS</div>
                </div>
            </div>
        </div>

        <div class="matchup">
            <span class="vilonia">VILONIA EAGLES</span> <span class="vs">vs</span> <span class="opponent">NETTLETON</span>
        </div>
        <div class="game-time">
            AUGUST 28 <span class="divider-red">|</span> 7:00 PM
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
